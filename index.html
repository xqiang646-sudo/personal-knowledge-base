<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="记录自动驾驶、人工智能与工程实践的个人知识库。">
  <title>我的个人知识库</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #687085;
      --brand: #3157d5;
      --line: #e2e6ef;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.7; }
    header { background: linear-gradient(135deg, #172554, #3157d5); color: white; }
    .wrap { width: min(960px, calc(100% - 40px)); margin: 0 auto; }
    .hero { padding: 72px 0 64px; }
    .eyebrow { margin: 0 0 8px; opacity: .72; font-size: 14px; letter-spacing: .12em; }
    h1 { margin: 0; font-size: clamp(34px, 7vw, 58px); line-height: 1.15; }
    .intro { max-width: 600px; margin: 18px 0 0; color: #dce5ff; font-size: 18px; }
    main { padding: 48px 0 80px; }
    .section-title { margin: 0 0 20px; font-size: 24px; }
    .cards { display: grid; gap: 20px; }
    .card {
      display: block;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(30, 45, 90, .06);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(30, 45, 90, .12); }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .tag { padding: 3px 10px; border-radius: 999px; background: #edf1ff; color: var(--brand); font-size: 13px; }
    h2 { margin: 0 0 10px; font-size: 25px; }
    .summary { margin: 0; color: var(--muted); }
    .read { display: inline-block; margin-top: 18px; color: var(--brand); font-weight: 650; }
    footer { padding: 24px 0 40px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="wrap hero">
      <p class="eyebrow">PERSONAL KNOWLEDGE BASE</p>
      <h1>我的个人知识库</h1>
      <p class="intro">记录、整理并连接自动驾驶、人工智能与工程实践中的关键知识。</p>
    </div>
  </header>
  <main class="wrap">
    <h2 class="section-title">最新条目</h2>
    <div class="cards">
      <a class="card" href="notes/gpu-workflow.html">
        <div class="meta">
          <span class="tag">自动驾驶</span>
          <span class="tag">GPU</span>
          <span class="tag">流程图</span>
        </div>
        <h2>GPU 工作流程图（自动驾驶版）</h2>
        <p class="summary">从传感器输入、CPU 预处理到 GPU 并行计算、AI 模型推理、感知结果和车辆控制，一张图看懂完整数据链路。</p>
        <span class="read">查看流程图 →</span>
      </a>
      <a class="card" href="notes/can-bus-interface.html">
        <div class="meta">
          <span class="tag">自动驾驶</span>
          <span class="tag">CAN 总线</span>
          <span class="tag">GPU</span>
          <span class="tag">入门</span>
        </div>
        <h2>CAN 总线接口功能解析</h2>
        <p class="summary">从 CAN 报文、接线和终端电阻出发，理解 RViz、HMI、NVIDIA GPU 在自动驾驶系统中的位置，并用一张流程图串起完整数据链路。</p>
        <span class="read">阅读笔记 →</span>
      </a>
    </div>
  </main>
  <footer class="wrap">持续学习，持续整理。</footer>
</body>
</html>
